# Render Blueprint — Player Development App
# ------------------------------------------------------------------
# Provisions three resources in one click from this repo:
#   1. pdev-postgres  — managed PostgreSQL
#   2. pdev-api       — NestJS API (apps/api), serves /api/* over HTTPS
#   3. pdev-web       — Next.js web app (apps/web), the public site
#
# After the first deploy you must set the `sync: false` env vars in the
# Render dashboard (they're intentionally not committed):
#   pdev-api : CORS_ORIGINS, BUNNY_STREAM_*, ADMIN_EMAIL, ADMIN_PASSWORD
#   pdev-web : API_PROXY_TARGET  (= the pdev-api public URL once it exists)
# JWT_SECRET + the database URL are generated/wired automatically below.
# ------------------------------------------------------------------

databases:
  - name: pdev-postgres
    databaseName: pdev
    user: pdev
    plan: free          # bump to "starter" for backups + more storage

services:
  # ── API (NestJS) ────────────────────────────────────────────────
  - type: web
    name: pdev-api
    runtime: node
    plan: starter
    rootDir: .
    # use-postgres.js flips the Prisma datasource to postgresql, then we
    # generate the client + compile. Local dev stays on SQLite.
    buildCommand: pnpm install && pnpm --filter api build:prod
    # Runs after build, before traffic, with DATABASE_URL live: sync the
    # schema to Postgres and seed the admin + drill library (idempotent).
    preDeployCommand: pnpm --filter api db:deploy && pnpm --filter api seed:prod
    startCommand: pnpm --filter api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pdev-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: STORAGE_DRIVER
        value: bunny
      # --- set these in the dashboard (sync:false = not committed) ---
      - key: CORS_ORIGINS            # e.g. https://app.definedbaseball.com
        sync: false
      - key: BUNNY_STREAM_LIBRARY_ID
        sync: false
      - key: BUNNY_STREAM_API_KEY
        sync: false
      - key: BUNNY_STREAM_CDN_HOSTNAME   # e.g. vz-xxxx-yyy.b-cdn.net
        sync: false
      - key: BUNNY_STREAM_MP4_QUALITY
        value: "720p"
      - key: ADMIN_EMAIL             # connor@definedbaseball.com
        sync: false
      - key: ADMIN_PASSWORD          # your chosen admin password
        sync: false

  # ── Web (Next.js) ───────────────────────────────────────────────
  - type: web
    name: pdev-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: NODE_ENV
        value: production
      # The Next server proxies /api/* here. Set to the pdev-api public URL
      # (https://pdev-api-xxxx.onrender.com) after the API's first deploy.
      - key: API_PROXY_TARGET
        sync: false
