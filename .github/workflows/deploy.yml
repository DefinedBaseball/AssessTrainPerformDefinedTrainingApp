# ─── Deploy Pipeline ─────────────────────────────────────────────────────
# Builds Docker images, pushes to ECR, and deploys to ECS Fargate.
# Triggered on push to main (production) or develop (staging).
# ─────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress deployments

env:
  AWS_REGION: us-east-1

jobs:
  # ─── Determine Environment ────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      api_ecr: ${{ steps.env.outputs.api_ecr }}
      web_ecr: ${{ steps.env.outputs.web_ecr }}

    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "api_ecr=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/playerdev-api" >> $GITHUB_OUTPUT
          echo "web_ecr=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/playerdev-web" >> $GITHUB_OUTPUT

  # ─── Build & Push API ─────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        env:
          ECR_REPO: ${{ needs.setup.outputs.api_ecr }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest ./apps/api
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

  # ─── Build & Push Web ─────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Web image
        env:
          ECR_REPO: ${{ needs.setup.outputs.web_ecr }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest ./apps/web
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

  # ─── Deploy to ECS ────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [setup, build-api, build-web]
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API service
        env:
          CLUSTER: playerdev-${{ needs.setup.outputs.environment }}-cluster
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service playerdev-${{ needs.setup.outputs.environment }}-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Web service
        env:
          CLUSTER: playerdev-${{ needs.setup.outputs.environment }}-cluster
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service playerdev-${{ needs.setup.outputs.environment }}-web \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API deployment
        env:
          CLUSTER: playerdev-${{ needs.setup.outputs.environment }}-cluster
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services playerdev-${{ needs.setup.outputs.environment }}-api \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Web deployment
        env:
          CLUSTER: playerdev-${{ needs.setup.outputs.environment }}-cluster
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services playerdev-${{ needs.setup.outputs.environment }}-web \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        run: |
          echo "## Deployment Complete ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API Image:** ${{ needs.setup.outputs.api_ecr }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Image:** ${{ needs.setup.outputs.web_ecr }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
