# ─── CI Pipeline ─────────────────────────────────────────────────────────
# Runs on every push & PR: lint, type-check, test, build
# ─────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── API: Lint, Type-check, Test, Build ────────────────────────────
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      # Pure-function unit tests — JWT round-trip, parser registry,
      # assertPlayerOwnership ownership boundary. No DB or running
      # server required, so they run on every PR for free.
      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  # ─── Web: Lint, Type-check, Build ─────────────────────────────────
  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─── Mobile: Type-check ───────────────────────────────────────────
  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  # ─── Terraform Validate ───────────────────────────────────────────
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ─── Docker Build Test ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, web]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t playerdev-api:test ./apps/api

      - name: Build Web image
        run: docker build -t playerdev-web:test ./apps/web
